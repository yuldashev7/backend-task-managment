          type: integer
        todo_tasks:
          type: integer
        approved_tasks:
          type: integer
        progress_percentage:
          type: number
          format: double
        tasks_by_priority:
          type: object
          additionalProperties:
            type: integer
        recent_tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
      required:
      - approved_tasks
      - completed_tasks
      - in_progress_tasks
      - progress_percentage
      - recent_tasks
      - review_tasks
      - tasks_by_priority
      - todo_tasks
      - total_tasks

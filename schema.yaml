openapi: 3.0.3
info:
  title: Task Management API
  version: 1.0.0
  description: Real-Time Task Management Backend
paths:
  /api/admin/users/:
    get:
      operationId: admin_users_list
      description: Admin/PM operations for user management.
      summary: List Employees (PM Only)
      tags:
      - admin
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Employee'
          description: ''
    post:
      operationId: admin_users_create
      description: Admin/PM operations for user management.
      summary: Add Employee (PM Only)
      tags:
      - admin
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmployeeCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmployeeCreate'
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeCreate'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeCreate'
          description: ''
  /api/admin/users/{id}/:
    get:
      operationId: admin_users_retrieve
      description: Admin/PM operations for user management.
      summary: Get Employee Details (PM Only)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
      tags:
      - admin
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
          description: ''
    put:
      operationId: admin_users_update
      description: Admin/PM operations for user management.
      summary: Update Employee (PM Only)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
      tags:
      - admin
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmployeeUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmployeeUpdate'
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeUpdate'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeUpdate'
          description: ''
    patch:
      operationId: admin_users_partial_update
      description: Admin/PM operations for user management.
      summary: Partial Update Employee (PM Only)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
      tags:
      - admin
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedEmployeeUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedEmployeeUpdate'
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedEmployeeUpdate'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeUpdate'
          description: ''
    delete:
      operationId: admin_users_destroy
      description: Blocks the employee by setting is_active=False instead of deleting
        from DB.
      summary: Block Employee (Soft Delete) (PM Only)
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
      tags:
      - admin
      responses:
        '204':
          description: No response body
  /api/auth/forgot-password/:
    post:
      operationId: auth_forgot_password_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPassword'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ForgotPassword'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ForgotPassword'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Kod generatsiya qilindi
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: 'Validatsiya xatosi (masalan: email formati noto''g''ri)'
        '404':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Foydalanuvchi topilmadi
        '429':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Ko'p so'rov yuborildi (Rate Limit)
  /api/auth/google/:
    post:
      operationId: auth_google_create
      description: Authenticate using Google id_token. The user must be pre-registered
        by an admin. JWT tokens are set as HttpOnly cookies.
      summary: Google Login
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleLogin'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GoogleLogin'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GoogleLogin'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '401':
          description: Unregistered user or invalid token.
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: Authenticate with username/password. JWT tokens are set as HttpOnly
        cookies.
      summary: Login
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '401':
          description: Invalid credentials
  /api/auth/logout/:
    post:
      operationId: auth_logout_create
      description: Clear HttpOnly JWT cookies.
      summary: Logout
      tags:
      - auth
      responses:
        '200':
          description: Logged out
  /api/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: Get or update the currently authenticated user profile.
      summary: Get Current User
      tags:
      - auth
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    put:
      operationId: auth_me_update
      description: Get or update the currently authenticated user profile.
      summary: Update Current User Profile
      tags:
      - auth
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserUpdate'
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    patch:
      operationId: auth_me_partial_update
      description: Get or update the currently authenticated user profile.
      summary: Partial Update Current User Profile
      tags:
      - auth
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdate'
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserUpdate'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: Read the refresh_token cookie and return a fresh access_token cookie.
      summary: Refresh Token
      tags:
      - auth
      security:
      - {}
      responses:
        '200':
          description: Token refreshed
        '401':
          description: Invalid or missing refresh token
  /api/auth/register/:
    post:
      operationId: auth_register_create
      description: Create a new user account.
      summary: Register
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Register'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Register'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Register'
        required: true
      security:
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/auth/reset-password/:
    post:
      operationId: auth_reset_password_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPassword'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ResetPassword'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ResetPassword'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Parol muvaffaqiyatli yangilandi
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Noto'g'ri kod, yoki validatsiya xatosi
        '404':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Foydalanuvchi topilmadi
  /api/auth/verify-otp/:
    post:
      operationId: auth_verify_otp_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOTP'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerifyOTP'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerifyOTP'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Kod to'g'ri
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: Noto'g'ri kod, yoki validatsiya xatosi
  /api/channels/:
    get:
      operationId: channels_list
      description: Filterable by `project` query param.
      summary: List Channels
      tags:
      - channels
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Channel'
          description: ''
    post:
      operationId: channels_create
      description: CRUD for chat channels + nested messages endpoint.
      summary: Create Channel
      tags:
      - channels
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Channel'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Channel'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Channel'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
          description: ''
  /api/channels/{id}/:
    get:
      operationId: channels_retrieve
      description: CRUD for chat channels + nested messages endpoint.
      summary: Get Channel
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - channels
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
          description: ''
    put:
      operationId: channels_update
      description: CRUD for chat channels + nested messages endpoint.
      summary: Update Channel
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - channels
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Channel'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Channel'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Channel'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
          description: ''
    patch:
      operationId: channels_partial_update
      description: CRUD for chat channels + nested messages endpoint.
      summary: Partial Update Channel
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - channels
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedChannel'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedChannel'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedChannel'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
          description: ''
    delete:
      operationId: channels_destroy
      description: CRUD for chat channels + nested messages endpoint.
      summary: Delete Channel
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - channels
      responses:
        '204':
          description: No response body
  /api/channels/{id}/messages/:
    get:
      operationId: channels_messages_list
      description: CRUD for chat channels + nested messages endpoint.
      summary: List Channel Messages
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - channels
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
          description: ''
  /api/channels/{id}/messages/send/:
    post:
      operationId: channels_messages_send_create
      description: Create a new message in this channel (also broadcast via WebSocket).
      summary: Send Message to Channel
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - channels
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Message'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Message'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Message'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
          description: ''
  /api/documents/:
    get:
      operationId: documents_list
      description: PM'lar uchun hujjatlarni (TZ, eslatmalar) boshqarish API'si.
      summary: PM hujjatlar ro'yxati (Faqat PM)
      tags:
      - documents
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Document'
          description: ''
    post:
      operationId: documents_create
      description: PM'lar uchun hujjatlarni (TZ, eslatmalar) boshqarish API'si.
      summary: Hujjat yaratish (Faqat PM)
      tags:
      - documents
      requestBody:
        content:
          application/json:
            schema:

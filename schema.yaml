            schema:
              $ref: '#/components/schemas/Document'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Document'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Document'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
          description: ''
    patch:
      operationId: documents_partial_update
      description: PM'lar uchun hujjatlarni (TZ, eslatmalar) boshqarish API'si.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - documents

      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
          description: ''
    delete:
      operationId: documents_destroy
      description: PM'lar uchun hujjatlarni (TZ, eslatmalar) boshqarish API'si.
      summary: Hujjatni o'chirish (Faqat PM)
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - documents
      responses:
        '204':
          description: No response body
  /api/feedback/:
    get:
      operationId: feedback_list
      description: Filterable by `project` query param. Requires authentication.
      summary: List Feedback
      tags:
      - feedback
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Feedback'
          description: ''
    post:
      operationId: feedback_create
      description: No authentication required. User identity is not stored.
      summary: Submit Anonymous Feedback
      tags:
      - feedback
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Feedback'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Feedback'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Feedback'
        required: true
      security:
      - {}

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feedback'
          description: ''
  /api/feedback/{id}/:
    get:
      operationId: feedback_retrieve
      description: Anonymous feedback.
      summary: Get Feedback
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this feedback.
        required: true
      tags:
